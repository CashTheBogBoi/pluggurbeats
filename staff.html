<!--
  PluggurBeats — Staff moderation dashboard
  -------------------------------------------------------------------
  Access is restricted to emails listed in functions/staff.json and
  enforced server-side by the listReviewCampaigns / moderateCampaign
  callables. Non-staff are bounced back to the marketing site.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PluggurBeats — Staff Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:#0B0A0F; --ink-2:#131119; --ink-3:#1B1822;
    --line:rgba(255,255,255,.09); --line-strong:rgba(255,255,255,.16);
    --bone:#F3EFE6; --bone-dim:#A29DAC;
    --gold:#E4C16B; --gold-deep:#C9A24B; --violet:#7C5CFF;
    --bad:#FF6B6B; --ok:#7CE2A4; --info:#6EC1FF;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--bone);font-family:"Inter",system-ui,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.05}
  .mono{font-family:"Space Mono",monospace;letter-spacing:.02em}
  button{font-family:inherit;cursor:pointer}
  main{max-width:1060px;margin:0 auto;padding:34px 24px 100px}

  /* ---------- header ---------- */
  .head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;gap:16px;flex-wrap:wrap}
  .eyebrow{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .head h1{font-size:clamp(24px,4vw,34px);margin-top:6px}
  .who{font-size:12px;color:var(--bone-dim);text-align:right}
  .signout{background:none;border:1px solid var(--line-strong);color:var(--bone-dim);border-radius:8px;padding:7px 12px;font-size:12px;margin-top:6px}
  .signout:hover{color:var(--bone);border-color:var(--bone)}

  /* ---------- stats bar ---------- */
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
  @media(max-width:560px){.stats-bar{grid-template-columns:1fr}}
  .stat-chip{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:16px 20px}
  .stat-chip .v{font-family:"Bricolage Grotesque";font-weight:800;font-size:32px;line-height:1}
  .stat-chip .l{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--bone-dim);margin-top:8px}

  /* ---------- filters ---------- */
  .filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .search-inp{flex:1;min-width:180px;background:var(--ink-2);border:1px solid var(--line-strong);color:var(--bone);
    padding:10px 14px;border-radius:10px;font-size:14px;font-family:inherit}
  .search-inp:focus{outline:2px solid var(--violet);border-color:transparent}
  .filter-sel{background:var(--ink-2);border:1px solid var(--line-strong);color:var(--bone);
    padding:10px 14px;border-radius:10px;font-size:14px;font-family:inherit}

  /* ---------- tab bar ---------- */
  .seg{display:inline-flex;background:var(--ink-2);border:1px solid var(--line);border-radius:999px;padding:4px;margin-bottom:22px;flex-wrap:wrap}
  .seg button{border:0;background:none;color:var(--bone-dim);padding:8px 18px;border-radius:999px;font-size:13px;font-weight:600}
  .seg button.active{background:var(--gold);color:#1a1405}
  .seg .count{font-family:"Space Mono",monospace;font-size:11px;opacity:.7;margin-left:6px}

  /* ---------- campaign card ---------- */
  .card{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
  .crow{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .cmeta{font-size:13px;color:var(--bone-dim);margin-top:4px}

  /* contact row */
  .contact-row{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
  .contact-chip{font-family:"Space Mono",monospace;font-size:11px;color:var(--bone-dim);display:flex;align-items:center;gap:5px}
  .contact-chip svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex:none;opacity:.6}

  /* badges */
  .badge{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .badge.pending_review{background:rgba(228,193,107,.16);color:var(--gold)}
  .badge.approved{background:rgba(124,226,164,.14);color:var(--ok)}
  .badge.rejected{background:rgba(255,107,107,.12);color:var(--bad)}
  .badge.pitched{background:rgba(110,193,255,.14);color:var(--info)}
  .badge.send_failed{background:rgba(255,107,107,.12);color:var(--bad)}
  .badge.no_contacts{background:rgba(163,157,172,.12);color:var(--bone-dim)}
  .badge-sm{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:999px;white-space:nowrap}
  .badge-sm.opened{background:rgba(228,193,107,.16);color:var(--gold)}
  .badge-sm.downloaded{background:rgba(124,226,164,.14);color:var(--ok)}

  /* beat player */
  .beat{background:var(--ink);border:1px solid var(--line-strong);border-radius:12px;padding:14px;margin-top:12px}
  .beat .bt{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .beat .bname{font-weight:600;font-size:15px}
  .beat .bspec{font-family:"Space Mono",monospace;font-size:11px;color:var(--bone-dim)}
  .beat audio{width:100%;margin-top:10px;height:38px}
  .collabs{margin-top:8px;font-size:12px;color:var(--bone-dim)}
  .collabs span{display:inline-block;background:var(--ink-3);border:1px solid var(--line);border-radius:999px;padding:3px 9px;margin:3px 4px 0 0}

  .targets{margin-top:12px;font-size:12px;color:var(--bone-dim)}

  /* pitch detail table */
  .pitch-detail{margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
  .pitch-detail-head{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--gold);margin-bottom:10px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .pitch-detail-head .pstat{color:var(--bone-dim)}
  table.pitch-table{width:100%;border-collapse:collapse;font-size:12px}
  table.pitch-table th{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--bone-dim);text-align:left;padding:7px 10px;border-bottom:1px solid var(--line)}
  table.pitch-table td{padding:9px 10px;border-bottom:1px solid var(--line)}
  table.pitch-table tr:last-child td{border-bottom:0}

  /* actions */
  .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:999px;font-weight:600;font-size:14px;border:1px solid transparent}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-approve{background:var(--ok);color:#062a14}
  .btn-reject{background:transparent;color:var(--bad);border-color:var(--bad)}
  .btn-reject:hover{background:rgba(255,107,107,.1)}
  .btn-retry{background:rgba(228,193,107,.16);color:var(--gold);border-color:var(--gold-deep)}
  .btn-retry:hover{background:rgba(228,193,107,.26)}

  /* rejection modal */
  .overlay{position:fixed;inset:0;z-index:90;background:rgba(5,4,8,.74);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:20px}
  .overlay.show{display:flex}
  .modal{width:100%;max-width:440px;background:var(--ink-3);border:1px solid var(--line-strong);border-radius:20px;
    padding:30px;position:relative}
  .modal h3{font-size:20px;margin-bottom:16px}
  .modal .x{position:absolute;top:16px;right:16px;background:none;border:0;color:var(--bone-dim);font-size:20px}
  .modal label{display:block;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--bone-dim);margin-bottom:7px}
  .modal select,.modal textarea{width:100%;background:var(--ink);border:1px solid var(--line-strong);color:var(--bone);
    padding:11px 13px;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:14px}
  .modal textarea{resize:vertical;min-height:80px}
  .modal-actions{display:flex;gap:10px;margin-top:6px}

  /* misc */
  .state{color:var(--bone-dim);text-align:center;padding:60px 20px;font-size:14px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink-3);border:1px solid var(--gold-deep);color:var(--bone);padding:13px 20px;border-radius:12px;
    font-size:14px;z-index:100;transition:.25s;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hide{display:none !important}

  /* users list */
  .urow{display:flex;align-items:center;gap:14px;background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .urow:hover{border-color:var(--line-strong);background:var(--ink-3)}
  .uavatar{width:46px;height:46px;border-radius:50%;flex:none;background:linear-gradient(135deg,var(--gold),var(--violet));display:grid;place-items:center;font-family:"Bricolage Grotesque";font-weight:800;color:#1a1405;background-size:cover;background-position:center}
  .urow .un{font-weight:600;font-size:15px}
  .urow .ue{font-size:12px;color:var(--bone-dim)}
  .urow .uloc{margin-left:auto;font-size:12px;color:var(--bone-dim);text-align:right;white-space:nowrap}

  /* user modal */
  .umodal{width:100%;max-width:460px;background:var(--ink-3);border:1px solid var(--line-strong);border-radius:20px;padding:28px;position:relative}
  .umodal .x{position:absolute;top:16px;right:16px;background:none;border:0;color:var(--bone-dim);font-size:20px;cursor:pointer}
  .udetail-head{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .udetail-head .big{width:80px;height:80px;border-radius:50%;flex:none;background:linear-gradient(135deg,var(--gold),var(--violet));display:grid;place-items:center;font-family:"Bricolage Grotesque";font-weight:800;font-size:32px;color:#1a1405;background-size:cover;background-position:center}
  .ufield{margin-top:14px}
  .ufield .lab{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--bone-dim);margin-bottom:4px}
  .ufield .val{font-size:14px;white-space:pre-wrap}
</style>

<main id="app" class="hide">
  <div class="head">
    <div>
      <div class="eyebrow">Staff · Moderation</div>
      <h1>Campaign review</h1>
    </div>
    <div>
      <div class="who" id="who"></div>
      <div style="text-align:right"><button class="signout" onclick="signOutStaff()">Sign out</button></div>
    </div>
  </div>

  <!-- primary view switch -->
  <div class="seg" style="margin-bottom:18px">
    <button id="view-campaigns" class="active" onclick="switchView('campaigns')">Campaigns</button>
    <button id="view-users" onclick="switchView('users')">Users <span class="count" id="ct-users"></span></button>
  </div>

  <!-- ============ CAMPAIGNS VIEW ============ -->
  <div id="campaignsView">
    <div class="stats-bar">
      <div class="stat-chip"><div class="v" id="scPending">—</div><div class="l">Pending review</div></div>
      <div class="stat-chip"><div class="v" id="scWeek">—</div><div class="l">Approved this week</div></div>
      <div class="stat-chip"><div class="v" id="scPitched">—</div><div class="l">Successfully pitched</div></div>
    </div>

    <div class="filters">
      <input class="search-inp" id="searchInput" placeholder="Search by producer name or Instagram…" oninput="filterAndRender()">
      <select class="filter-sel" id="filterPackage" onchange="filterAndRender()">
        <option value="">All packages</option>
        <option value="starter">Starter</option>
        <option value="pro">Pro</option>
        <option value="label">Label</option>
      </select>
    </div>

    <div class="seg">
      <button id="seg-pending"  class="active" onclick="setTab('pending')">Pending <span class="count" id="ct-pending"></span></button>
      <button id="seg-approved" onclick="setTab('approved')">Approved <span class="count" id="ct-approved"></span></button>
      <button id="seg-rejected" onclick="setTab('rejected')">Rejected <span class="count" id="ct-rejected"></span></button>
    </div>

    <div id="list"><div class="state">Loading campaigns…</div></div>
  </div>

  <!-- ============ USERS VIEW ============ -->
  <div id="usersView" class="hide">
    <input class="search-inp" id="userSearch" placeholder="Search users by name, email, location or UID…" oninput="renderUsers()" style="margin-bottom:16px;width:100%">
    <div id="userList"><div class="state">Loading users…</div></div>
  </div>
</main>

<!-- ============ USER PROFILE MODAL ============ -->
<div class="overlay" id="userOverlay" onclick="if(event.target===this)closeUser()">
  <div class="umodal" role="dialog" aria-modal="true">
    <button class="x" onclick="closeUser()" aria-label="Close">✕</button>
    <div id="userDetail"></div>
  </div>
</div>

<div id="gate" class="state" style="padding-top:120px">Checking access…</div>

<!-- rejection reason modal -->
<div class="overlay" id="rejectOverlay" onclick="if(event.target===this)closeRejectModal()">
  <div class="modal">
    <button class="x" onclick="closeRejectModal()" aria-label="Close">✕</button>
    <h3>Reject campaign</h3>
    <label for="rejectReason">Reason</label>
    <select id="rejectReason">
      <option>Low quality mix</option>
      <option>Wrong genre</option>
      <option>Needs revision</option>
      <option>Incomplete submission</option>
      <option>Does not meet quality standards</option>
      <option>Other</option>
    </select>
    <label for="rejectNote">Additional note (optional — sent to producer)</label>
    <textarea id="rejectNote" placeholder="e.g. The mix is too muddy on the low end — resubmit after mastering."></textarea>
    <div class="modal-actions">
      <button class="btn btn-reject" id="rejectConfirmBtn" onclick="confirmReject()">Confirm rejection</button>
      <button class="btn" style="background:var(--ink-2);color:var(--bone-dim);border-color:var(--line-strong)" onclick="closeRejectModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFunctions, httpsCallable }          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";

const firebaseConfig = {
  apiKey:            "AIzaSyATP9LnN8pYEeXUd2TmDUZAPrAx9KNbudM",
  authDomain:        "pluggurbeats.firebaseapp.com",
  projectId:         "pluggurbeats",
  storageBucket:     "pluggurbeats.firebasestorage.app",
  messagingSenderId: "990734368924",
  appId:             "1:990734368924:web:1be6ebfbccab82cb576d59",
  measurementId:     "G-J1M418YLQL"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const fns  = getFunctions(app, "us-central1");
const listReviewCampaigns = httpsCallable(fns, "listReviewCampaigns");
const moderateCampaign    = httpsCallable(fns, "moderateCampaign");
const listUsers           = httpsCallable(fns, "listUsers");

let allCampaigns = [];
let allUsers = [];
let usersLoaded = false;
let tab = "pending";
let rejectPath = null;

window.signOutStaff = () => signOut(auth).then(() => location.href = "index.html");

function toast(t){
  const el = document.getElementById("toast");
  el.textContent = t;
  el.classList.add("show");
  clearTimeout(window._tt);
  window._tt = setTimeout(() => el.classList.remove("show"), 2800);
}

window.setTab = (t) => {
  tab = t;
  ["pending","approved","rejected"].forEach(s =>
    document.getElementById("seg-"+s).classList.toggle("active", s===t));
  filterAndRender();
};

window.filterAndRender = () => renderList();

// ---------- View switch (Campaigns / Users) ----------
window.switchView = async (view) => {
  document.getElementById("view-campaigns").classList.toggle("active", view==="campaigns");
  document.getElementById("view-users").classList.toggle("active", view==="users");
  document.getElementById("campaignsView").classList.toggle("hide", view!=="campaigns");
  document.getElementById("usersView").classList.toggle("hide", view!=="users");
  if(view==="users" && !usersLoaded) await loadUsers();
};

async function loadUsers(){
  try{
    const res = await listUsers();
    allUsers = res.data.users || [];
    usersLoaded = true;
    document.getElementById("ct-users").textContent = allUsers.length;
    renderUsers();
  }catch(e){
    document.getElementById("userList").innerHTML =
      `<div class="state">Could not load users: ${esc(e.message||e)}</div>`;
  }
}

window.renderUsers = () => {
  const q = (document.getElementById("userSearch").value || "").toLowerCase();
  const items = allUsers.filter(u =>
    !q || (u.displayName||"").toLowerCase().includes(q)
       || (u.email||"").toLowerCase().includes(q)
       || (u.location||"").toLowerCase().includes(q)
       || (u.uid||"").toLowerCase().includes(q));
  const el = document.getElementById("userList");
  if(items.length===0){ el.innerHTML = `<div class="state">No users found.</div>`; return; }
  el.innerHTML = items.map((u,i) => {
    const initial = (u.displayName||u.email||"?")[0].toUpperCase();
    const av = u.avatarUrl
      ? `style="background-image:url('${esc(u.avatarUrl)}')"`
      : "";
    return `<div class="urow" onclick="openUser(${allUsers.indexOf(u)})">
      <div class="uavatar" ${av}>${u.avatarUrl?"":esc(initial)}</div>
      <div>
        <div class="un">${esc(u.displayName||"—")}</div>
        <div class="ue">${esc(u.email||"")}</div>
      </div>
      <div class="uloc">${esc(u.location||"")}</div>
    </div>`;
  }).join("");
};

window.openUser = (idx) => {
  const u = allUsers[idx]; if(!u) return;
  const initial = (u.displayName||u.email||"?")[0].toUpperCase();
  const av = u.avatarUrl ? `style="background-image:url('${esc(u.avatarUrl)}')"` : "";
  const field = (lab,val) => val ? `<div class="ufield"><div class="lab">${lab}</div><div class="val">${esc(val)}</div></div>` : "";
  document.getElementById("userDetail").innerHTML = `
    <div class="udetail-head">
      <div class="big" ${av}>${u.avatarUrl?"":esc(initial)}</div>
      <div>
        <h2 style="font-size:22px">${esc(u.displayName||"—")}</h2>
        <div class="ue" style="color:var(--bone-dim);font-size:13px">${esc(u.email||"")}</div>
      </div>
    </div>
    ${field("Location", u.location)}
    ${field("Phone", u.phone)}
    ${field("Bio", u.bio)}
    ${field("Joined", u.createdAt ? new Date(u.createdAt).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}) : "")}
    <div class="ufield"><div class="lab">User ID</div><div class="val mono" style="font-size:12px;word-break:break-all">${esc(u.uid)}</div></div>
  `;
  document.getElementById("userOverlay").classList.add("show");
};
window.closeUser = () => document.getElementById("userOverlay").classList.remove("show");

const STATUS_BY_TAB = {
  pending:  ["pending_review"],
  approved: ["approved","pitched","no_contacts","send_failed"],
  rejected: ["rejected"]
};

function esc(s){ return String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function fmtDate(ms){ return ms ? new Date(ms).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "—"; }

function counts(){
  const c = { pending:0, approved:0, rejected:0 };
  allCampaigns.forEach(cp => {
    if(STATUS_BY_TAB.pending.includes(cp.status))   c.pending++;
    else if(STATUS_BY_TAB.rejected.includes(cp.status)) c.rejected++;
    else c.approved++;
  });
  document.getElementById("ct-pending").textContent  = c.pending;
  document.getElementById("ct-approved").textContent = c.approved;
  document.getElementById("ct-rejected").textContent = c.rejected;
}

function updateStats(){
  const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const pending        = allCampaigns.filter(c => c.status === "pending_review").length;
  const approvedWeek   = allCampaigns.filter(c =>
    STATUS_BY_TAB.approved.includes(c.status) && c.moderatedAt && c.moderatedAt >= weekAgo
  ).length;
  const pitched        = allCampaigns.filter(c => c.status === "pitched").length;

  document.getElementById("scPending").textContent = pending;
  document.getElementById("scWeek").textContent    = approvedWeek;
  document.getElementById("scPitched").textContent = pitched;
}

function filteredCampaigns(){
  const query   = document.getElementById("searchInput").value.toLowerCase();
  const pkg     = document.getElementById("filterPackage").value;
  const wanted  = STATUS_BY_TAB[tab];
  return allCampaigns.filter(c => {
    if(!wanted.includes(c.status)) return false;
    if(pkg && c.package !== pkg)   return false;
    if(query){
      const name = (c.producer.name     || "").toLowerCase();
      const ig   = (c.producer.instagram|| "").toLowerCase();
      if(!name.includes(query) && !ig.includes(query)) return false;
    }
    return true;
  });
}

function renderPitchDetail(c){
  if(!c.pitchedTo?.length) return "";

  // Aggregate events by contact
  const byContact = new Map();
  c.pitchedTo.forEach(email => byContact.set(email, { opened:false, downloaded:false, last:null }));
  (c.events || []).forEach(e => {
    const rec = byContact.get(e.contact);
    if(!rec) return;
    if(e.type === "opened")     rec.opened = true;
    if(e.type === "downloaded") rec.downloaded = true;
    if(e.timestamp && (!rec.last || e.timestamp > rec.last)) rec.last = e.timestamp;
  });

  const rows = [...byContact.entries()].map(([email, rec]) => `
    <tr>
      <td>${esc(email)}</td>
      <td>${rec.opened     ? '<span class="badge-sm opened">Opened</span>'     : '<span style="color:var(--bone-dim)">—</span>'}</td>
      <td>${rec.downloaded ? '<span class="badge-sm downloaded">Downloaded</span>' : '<span style="color:var(--bone-dim)">—</span>'}</td>
      <td style="color:var(--bone-dim)">${fmtDate(rec.last)}</td>
    </tr>`).join("");

  return `
    <div class="pitch-detail">
      <div class="pitch-detail-head">
        Pitch tracking
        <span class="pstat">${c.pitchedTo.length} contacted</span>
        <span class="pstat">${c.opens} opens</span>
        <span class="pstat">${c.downloads} downloads</span>
      </div>
      <table class="pitch-table">
        <thead><tr><th>Contact</th><th>Opened</th><th>Downloaded</th><th>Last activity</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderList(){
  const items = filteredCampaigns();
  const el    = document.getElementById("list");
  if(items.length === 0){
    el.innerHTML = `<div class="state">No ${tab} campaigns${document.getElementById("searchInput").value ? " matching your search" : ""}.</div>`;
    return;
  }

  el.innerHTML = items.map(c => {
    const beats = c.beats.map(b => {
      const spec   = [b.genre, b.key, b.bpm && b.bpm+" BPM"].filter(Boolean).join(" · ");
      const collabs = (b.collabs||[]).map(x =>
        `<span>${esc(x.name)}${x.instagram?" "+esc(x.instagram):""}${x.role?" · "+esc(x.role):""}</span>`
      ).join("");
      const audio = b.playUrl
        ? `<audio controls preload="none" src="${esc(b.playUrl)}"></audio>`
        : `<div class="bspec" style="margin-top:8px">No file</div>`;
      return `<div class="beat">
        <div class="bt"><span class="bname">${esc(b.title)}</span><span class="bspec">${esc(spec)}</span></div>
        ${audio}
        ${collabs ? `<div class="collabs">${collabs}</div>` : ""}
      </div>`;
    }).join("");

    // contact info chips
    const email = c.producer.email ? `<span class="contact-chip">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
      ${esc(c.producer.email)}</span>` : "";
    const phone = c.producer.phone ? `<span class="contact-chip">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.35 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6.29 6.29l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      ${esc(c.producer.phone)}</span>` : "";

    // actions
    const isPending    = c.status === "pending_review";
    const isSendFailed = c.status === "send_failed";
    const actions = isPending ? `
      <div class="actions">
        <button class="btn btn-approve" onclick="decide('${esc(c.path)}','approved',this)">Approve &amp; pitch</button>
        <button class="btn btn-reject"  onclick="openRejectModal('${esc(c.path)}',this)">Reject</button>
      </div>` : isSendFailed ? `
      <div class="actions">
        <button class="btn btn-retry" onclick="repitch('${esc(c.path)}',this)">↺ Retry pitch</button>
      </div>` : "";

    const pitchDetail = ["pitched","approved","send_failed"].includes(c.status) ? renderPitchDetail(c) : "";

    const statusLabel = (c.status||"").replace(/_/g," ");

    return `<div class="card">
      <div class="crow">
        <div>
          <h3 style="font-size:18px">
            ${esc(c.producer.name||"Unknown producer")}
            ${c.producer.instagram ? `<span class="bspec" style="font-size:13px;font-weight:400"> ${esc(c.producer.instagram)}</span>` : ""}
          </h3>
          <div class="contact-row">${email}${phone}</div>
          <div class="cmeta" style="margin-top:8px">${esc(c.package||"—")} package · ${c.pitches} guaranteed pitches · ${c.beats.length} beat${c.beats.length!==1?"s":""} · ${fmtDate(c.createdAt)}</div>
          <div class="cmeta mono" style="font-size:11px">${esc(c.id)}</div>
        </div>
        <span class="badge ${esc(c.status)}">${esc(statusLabel)}</span>
      </div>
      ${beats}
      <div class="targets">Targets: ${c.targets.length ? esc(c.targets.join(", ")) : "—"}</div>
      ${pitchDetail}
      ${actions}
    </div>`;
  }).join("");
}

// ---- approve ----
window.decide = async (path, decision, btn) => {
  const card = btn.closest(".card");
  card.querySelectorAll(".btn").forEach(b => b.disabled = true);
  btn.textContent = "Approving…";
  try {
    await moderateCampaign({ path, decision });
    const c = allCampaigns.find(x => x.path === path);
    if(c) c.status = decision;
    updateStats(); counts(); renderList();
    toast("Approved — pitching now.");
  } catch(e) {
    toast("Failed: " + (e.message||e));
    card.querySelectorAll(".btn").forEach(b => b.disabled = false);
    btn.textContent = "Approve & pitch";
  }
};

// ---- reject modal ----
window.openRejectModal = (path, btn) => {
  rejectPath = path;
  document.getElementById("rejectNote").value = "";
  document.getElementById("rejectConfirmBtn").disabled = false;
  document.getElementById("rejectConfirmBtn").textContent = "Confirm rejection";
  document.getElementById("rejectOverlay").classList.add("show");
};

window.closeRejectModal = () => {
  document.getElementById("rejectOverlay").classList.remove("show");
  rejectPath = null;
};

window.confirmReject = async () => {
  const reason = document.getElementById("rejectReason").value;
  const note   = document.getElementById("rejectNote").value.trim();
  const btn    = document.getElementById("rejectConfirmBtn");
  btn.disabled = true;
  btn.textContent = "Rejecting…";
  try {
    await moderateCampaign({ path: rejectPath, decision: "rejected", reason, note });
    const c = allCampaigns.find(x => x.path === rejectPath);
    if(c) c.status = "rejected";
    closeRejectModal();
    updateStats(); counts(); renderList();
    toast("Campaign rejected — producer notified by email.");
  } catch(e) {
    toast("Failed: " + (e.message||e));
    btn.disabled = false;
    btn.textContent = "Confirm rejection";
  }
};

// ---- re-pitch ----
window.repitch = async (path, btn) => {
  btn.disabled = true;
  btn.textContent = "Retrying…";
  try {
    await moderateCampaign({ path, decision: "approved" });
    const c = allCampaigns.find(x => x.path === path);
    if(c) c.status = "approved";
    updateStats(); counts(); renderList();
    toast("Re-pitch triggered — pitching now.");
  } catch(e) {
    toast("Failed: " + (e.message||e));
    btn.disabled = false;
    btn.textContent = "↺ Retry pitch";
  }
};

// ---- auth ----
onAuthStateChanged(auth, async user => {
  if(!user || !user.emailVerified){ location.href = "index.html"; return; }

  let res;
  try {
    res = await listReviewCampaigns();
  } catch(e) {
    if(e.code === "functions/permission-denied"){ location.href = "dashboard.html"; return; }
    document.getElementById("who").textContent = user.email;
    document.getElementById("app").classList.remove("hide");
    document.getElementById("gate").classList.add("hide");
    document.getElementById("list").innerHTML = `<div class="state">Could not load campaigns: ${esc(e.message||e)}</div>`;
    return;
  }

  document.getElementById("who").textContent = user.email;
  document.getElementById("app").classList.remove("hide");
  document.getElementById("gate").classList.add("hide");
  allCampaigns = res.data.campaigns || [];
  updateStats();
  counts();
  renderList();
});
</script>
